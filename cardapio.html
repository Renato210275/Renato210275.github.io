<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cardápio - Fúsion de Sabores</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #d32f2f;
      color: white;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      font-size: 2.5em;
    }

    nav a {
      color: white;
      padding: 10px 15px;
      text-decoration: none;
      font-size: 1.2em;
    }

    nav a:hover {
      background-color: #c2185b;
      border-radius: 5px;
    }

    main {
      padding: 20px;
    }

    h2 {
      font-size: 2.5em;
      color: #d32f2f;
      text-align: center;
    }

    .country-list {
      list-style: none;
      padding: 0;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 30px;
    }

    .country-list li {
      margin: 10px;
      text-align: center;
      background-color: #ffffff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      width: 30%;
      transition: transform 0.3s ease;
    }

    .country-list li:hover {
      transform: translateY(-10px);
    }

    .country-list li a {
      text-decoration: none;
      color: #d32f2f;
      font-size: 1.8em;
    }

    .country-list li a:hover {
      color: #c2185b;
    }

    footer {
      background-color: #d32f2f;
      color: white;
      text-align: center;
      padding: 10px;
      position: absolute;
      width: 100%;
      bottom: 0;
    }
  </style>
</head>

      <a href="mexico.html">México</a>
    </nav>
  </header>

  <main>

      <li><a href="brasil.html">Brasil</a></li>
      <li><a href="italia.html">Itália</a></li>
      <li><a href="franca.html">França</a></li>
      <li><a href="japao.html">Japão</a></li>
      <li><a href="mexico.html">México</a></li>
    </ul>
  </main>
